name: Module 6 CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'module_6/**'
      - '.github/workflows/module_6_tests.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'module_6/**'
      - '.github/workflows/module_6_tests.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # This spins up a temporary Postgres database specifically for your tests!
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Test Dependencies
        working-directory: ./module_6
        run: |
          python -m pip install --upgrade pip
          # Ensure pip installs requirements found in the current directory
          pip install -r requirements.txt
          # Explicitly install the dependencies that are failing
          pip install pika psycopg flask selenium

      - name: Run Pylint (Targeting 10.00/10)
        working-directory: ./module_6
        run: |
          # Use the same command that worked on your local machine
          python -m pylint src/web src/worker src/db

      - name: Run Pytest (Targeting 100% Coverage)
        env:
          GITHUB_ACTIONS: "true" # Tells our conftest.py to use the GitHub Postgres password
        run: |
          cd module_6
          python -m pytest tests/ --cov=src --cov-report=term-missing