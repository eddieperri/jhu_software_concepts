name: Module 5 CI Pipeline

on: [push, pull_request]

jobs:
  module-5-build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./module_5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install System Dependencies
      run: sudo apt-get install -y graphviz

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: 1. Enforce Pylint
      run: pylint src/ --fail-under=10

    - name: 2. Generate Dependency Graph
      run: pydeps src/flask_app.py --noshow -T svg -o dependency.svg

    - name: 3. Snyk Security Scan
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: |
        npm install -g snyk
        snyk test

    - name: 4. Run Pytest
      run: pytest