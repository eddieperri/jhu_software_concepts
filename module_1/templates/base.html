<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eddie Perri | Developer Portfolio</title>
    <style>
        /* A basic style to highlight the navigation bar */
        nav {
            background-color: #2c3e50;
            padding: 15px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        nav a:hover {
            color: #1abc9c; /* Highlights green when you hover */
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        main {
            padding: 30px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('contact.contact_page') }}">Contact</a>
        <a href="{{ url_for('projects.projects_page') }}">Projects</a>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
